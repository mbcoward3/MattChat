<!DOCTYPE html>
<html>
<head>
  <title>MattChat — Enterprise MCP Demo</title>
  <script src="https://cdn.platform.openai.com/deployments/chatkit/chatkit.js" async></script>
  <style>
    body { margin: 0; font-family: sans-serif; }
    openai-chatkit { display: block; height: 100vh; width: 100vw; }
  </style>
</head>
<body>
  <openai-chatkit></openai-chatkit>
  <script>
    window.addEventListener('load', function() {
      var el = document.querySelector('openai-chatkit');
      el.setOptions({
        api: {
          url: window.location.origin + '/api/chat',
          domainKey: 'local-dev',
        },
      });
    });
  </script>
</body>
</html>
